<!DOCTYPE HTML>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/modal.css">

<!--document.body.classList.add('active')-->

<body>
    <div class="wrapper">
            <div class="btn btn-three" onclick="document.body.classList.add('active')">
              <span>Click to open modal</span>
            </div>
    </div>

    <div class="wrapper">
        <div class="popup">
            <div class="popup-inside">
                <div class="backgrounds">
                    <div class="background"></div>
                    <div class="background background2"></div>
                    <div class="background background3"></div>
                    <div class="background background4"></div>
                    <div class="background background5"></div>
                    <div class="background background6"></div>
                </div>
            </div>
            <div class="content">
                <div class="content-wrapper">
                    <p class="text">This is a modal</p>
                    <p class="try-again" onclick="document.body.classList.remove('active')">Close</p>
                </div>
            </div>
        </div>
    </div>
    <div class="area" >
        <ul class="circles">
                <li></li>
                <li></li>

                <li></li>
        </ul>
</div >

</html>
